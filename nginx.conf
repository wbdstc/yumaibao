# Nginx configuration for CAD Viewer application
# This configuration fixes MIME type issues and ensures proper static asset handling

server {
    listen 80;
    server_name localhost;
    root /path/to/your/deploy-path;
    index index.html;

    # Log files
    access_log /var/log/nginx/cad-viewer.access.log;
    error_log /var/log/nginx/cad-viewer.error.log;

    # Properly handle static assets
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Assets directory with proper caching
    location /assets/ {
        alias /path/to/your/deploy-path/assets/;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=31536000" always;
        # Ensure correct MIME types for assets
        types {
            text/css css;
            application/javascript js mjs;
            image/png png;
            image/jpeg jpg jpeg;
            image/svg+xml svg;
            font/woff woff;
            font/woff2 woff2;
        }
    }

    # API proxy configuration
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle Web Workers with correct MIME type
    location ~* \.(worker|worker\.js)$ {
        add_header Content-Type application/javascript;
        try_files $uri $uri/ =404;
    }

    # Ensure all JavaScript files get correct MIME type
    location ~* \.(js|mjs)$ {
        add_header Content-Type application/javascript;
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=31536000" always;
    }

    # Model files handling
    location /models/ {
        proxy_pass http://localhost:3000/api/models/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_vary on;
    gzip_min_length 1024;
}
